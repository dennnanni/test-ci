name: Publish to GHCR

on:
  push:
    branches: ["master", "main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

permissions:
  contents: write    # Required for semantic-release to push tags
  packages: write    # Required to push to GHCR
  issues: write      # Required for semantic-release status updates
  pull-requests: write # Required for semantic-release status updates

jobs:
  test-and-coverage:
    name: Run Tests and Upload Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Workspace Tests with Coverage
        run: npm run test:coverage

      - name: Upload Backend Coverage
        uses: codecov/codecov-action@v5
        with:
          directory: ./backend/coverage/
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Frontend Coverage
        uses: codecov/codecov-action@v5
        with:
          directory: ./frontend/coverage/
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Go Test with Coverage
        working-directory: ./ext-api-service
        run: go test -v -coverprofile=coverage.out ./...

      - name: Upload Go Coverage
        uses: codecov/codecov-action@v5
        with:
          file: ./ext-api-service/coverage.out
          flags: ext-api-service
          token: ${{ secrets.CODECOV_TOKEN }}

  release:
    name: Release
    needs: test-and-coverage
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.check-tag.outputs.published }}
      version: ${{ steps.check-tag.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes semantic-release

      - name: Check for new release tag
        id: check-tag
        run: |
          git fetch --tags
          TAG=$(git tag --points-at HEAD | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)

          if [ -n "$TAG" ]; then
            echo "Detected release: $TAG"
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "version=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "No new release."
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build and Push Docker Images
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: .
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: .
            dockerfile: ./frontend/Dockerfile
          - name: ext-api-service
            context: ./ext-api-service
            dockerfile: ./ext-api-service/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Convert repository name to lowercase to prevent uppercase GHCR push errors
      - name: Lowercase Repository Name
        id: lowercase_repo
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.REPO }}-${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.name }}
