version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mevn_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mevn_backend
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/test-db
    ports:
      - "3000:3000"
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mevn_frontend
    ports:
      - "8080:80"
    environment:
      - VITE_BACKEND_URL=http://backend:3000

  nginx:
    image: nginx:alpine
    container_name: mevn_nginx
    ports:
      - "8001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongodb_data:
